<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Learn AI - Student Portal</title>
    <meta name="description" content="Login to your Learn AI student account. Access your courses, track progress, and download eBooks.">
    <link rel="canonical" href="https://yourdomain.com/login.html">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><svg class="logo-icon" width="40" height="40" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="34" height="34" rx="10" fill="#2563EB"/><circle cx="17" cy="11" r="2.5" fill="#fff"/><circle cx="11" cy="20" r="2.5" fill="#fff"/><circle cx="23" cy="20" r="2.5" fill="#fff"/><circle cx="14" cy="26" r="2" fill="#fff" opacity=".7"/><circle cx="20" cy="26" r="2" fill="#fff" opacity=".7"/><line x1="17" y1="11" x2="11" y2="20" stroke="#fff" stroke-width="1.5" opacity=".5"/><line x1="17" y1="11" x2="23" y2="20" stroke="#fff" stroke-width="1.5" opacity=".5"/><line x1="11" y1="20" x2="14" y2="26" stroke="#fff" stroke-width="1.2" opacity=".4"/><line x1="23" y1="20" x2="20" y2="26" stroke="#fff" stroke-width="1.2" opacity=".4"/><line x1="11" y1="20" x2="23" y2="20" stroke="#fff" stroke-width="1" opacity=".3"/></svg> Learn AI</div>
        <p class="auth-subtitle">Login to your student account</p>
        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>
        <form class="auth-form" id="loginForm">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required>
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
            <button type="submit" class="btn btn-primary btn-lg">Login</button>
        </form>
        <div class="auth-divider">or</div>
        <button class="btn-google" id="googleLogin">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
        </button>
        <p class="auth-footer">Don't have an account? <a href="login.html" id="toggleSignup">Sign Up</a></p>
        <p class="auth-footer" style="margin-top:8px"><a href="index.html">&larr; Back to Homepage</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
    (function() {
        'use strict';
        var isSignup = false;
        var form = document.getElementById('loginForm');
        var toggleLink = document.getElementById('toggleSignup');
        var errorEl = document.getElementById('authError');
        var successEl = document.getElementById('authSuccess');
        var googleBtn = document.getElementById('googleLogin');

        if (Auth.isLoggedIn()) {
            Auth.redirectAfterAuth();
            return;
        }

        function toggleMode() {
            isSignup = !isSignup;
            form.innerHTML = isSignup ?
                '<label for="signupName">Full Name</label><input type="text" id="signupName" placeholder="Your full name" required>' +
                '<label for="signupEmail">Email Address</label><input type="email" id="signupEmail" placeholder="you@example.com" required>' +
                '<label for="signupPassword">Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">' +
                '<button type="submit" class="btn btn-primary btn-lg">Create Account</button>' :
                '<label for="loginEmail">Email Address</label><input type="email" id="loginEmail" placeholder="you@example.com" required>' +
                '<label for="loginPassword">Password</label><input type="password" id="loginPassword" placeholder="Enter your password" required>' +
                '<button type="submit" class="btn btn-primary btn-lg">Login</button>';
            toggleLink.textContent = isSignup ? 'Login' : 'Sign Up';
            document.querySelector('.auth-subtitle').textContent = isSignup ? 'Create your student account' : 'Login to your student account';
            hideMessages();
        }

        toggleLink.addEventListener('click', function(e) { e.preventDefault(); toggleMode(); });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMessages();
            if (isSignup) {
                var name = document.getElementById('signupName').value.trim();
                var email = document.getElementById('signupEmail').value.trim();
                var pw = document.getElementById('signupPassword').value;
                if (!name || !email || !pw) { showError('Please fill in all fields.'); return; }
                var result = await Auth.signUp(email, pw, name);
                if (result.error) { showError(result.error); return; }
                showSuccess('Account created! Redirecting...');
                setTimeout(function() { Auth.redirectAfterLogin(result.user); }, 1000);
            } else {
                var email = document.getElementById('loginEmail').value.trim();
                var pw = document.getElementById('loginPassword').value;
                if (!email || !pw) { showError('Please enter email and password.'); return; }
                var result = await Auth.signIn(email, pw);
                if (result.error) { showError(result.error); return; }
                showSuccess('Login successful! Redirecting...');
                setTimeout(function() { Auth.redirectAfterLogin(result.user); }, 800);
            }
        });

        googleBtn.addEventListener('click', function() { Auth.signInWithGoogle(); });

        function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); successEl.classList.remove('show'); }
        function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('show'); errorEl.classList.remove('show'); }
        function hideMessages() { errorEl.classList.remove('show'); successEl.classList.remove('show'); }

        Auth.redirectAfterAuth = function() {
            var user = Auth.getUser();
            if (user && user.role === 'admin') { window.location.href = 'admin.html'; }
            else { window.location.href = 'dashboard.html'; }
        };
    })();
    </script>
</body>
</html>
